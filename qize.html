<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>صفحة أسئلة</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --main-blue: #003366;
      --main-orange: #f39c12;
      --light-bg: #f8f9fa;
    }
    body {
      background-color: var(--light-bg);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .quiz-container {
      max-width: 800px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .section-title {
      text-align: center;
      color: var(--main-blue);
      margin-bottom: 30px;
      position: relative;
    }
    .section-title::after {
      content: '';
      width: 60px;
      height: 3px;
      background: var(--main-orange);
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
    }
    .btn-orange {
      background-color: var(--main-orange);
      color: white;
      border-radius: 20px;
      padding: 10px 20px;
      border: none;
      transition: 0.3s;
    }
    .btn-orange:hover {
      background-color: #d87f0a;
    }
    
  </style>
</head>
<body>
     <div class="navbar">
        <a href="index.html" class="btn-orange">الرئيسية</a>
        <a href="index.html#students" class="nav-link">قسم الطلاب</a>
        <a href="index.html#pricing" class="nav-link">عروض</a>
        <a href="index.html#contact" class="nav-link">تواصل معنا</a>
    </div>

<div class="quiz-container">
  <h2 class="section-title">اختبار سريع</h2>

  <!-- سؤال 1 -->
  <div class="mb-4">
    <p><b>1- ما هي لغة بناء هيكل صفحات الويب؟</b></p>
    <div>
      <input type="radio" name="q1" value="HTML"> HTML<br>
      <input type="radio" name="q1" value="CSS"> CSS<br>
      <input type="radio" name="q1" value="JS"> JavaScript
    </div>
  </div>

  <!-- سؤال 2 -->
  <div class="mb-4">
    <p><b>2- أي لغة تستخدم لتنسيق الصفحة بالألوان والخطوط؟</b></p>
    <div>
      <input type="radio" name="q2" value="HTML"> HTML<br>
      <input type="radio" name="q2" value="CSS"> CSS<br>
      <input type="radio" name="q2" value="JS"> JavaScript
    </div>
  </div>

  <!-- سؤال 3 -->
  <div class="mb-4">
    <p><b>3- أي لغة تضيف التفاعل للصفحة مثل الأزرار؟</b></p>
    <div>
      <input type="radio" name="q3" value="HTML"> HTML<br>
      <input type="radio" name="q3" value="CSS"> CSS<br>
      <input type="radio" name="q3" value="JS"> JavaScript
    </div>
  </div>

  <button class="btn-orange" onclick="checkAnswers()">تصحيح الإجابات</button>
  <p id="result" class="mt-3 fw-bold"></p>
</div>

<script>
function checkAnswers() {
  let score = 0;
  if(document.querySelector('input[name="q1"]:checked')?.value === "HTML") score++;
  if(document.querySelector('input[name="q2"]:checked')?.value === "CSS") score++;
  if(document.querySelector('input[name="q3"]:checked')?.value === "JS") score++;

  document.getElementById("result").innerText = "درجتك: " + score + " من 3";
}
</script>

</body>
</html>
